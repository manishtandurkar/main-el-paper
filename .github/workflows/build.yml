name: Build LaTeX
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install TeX Live and tools
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra \
          texlive-bibtex-extra texlive-publishers texlive-science latexmk biber
    
    - name: Build PDF with latexmk
      run: |
        latexmk -pdf -f -interaction=nonstopmode -file-line-error access.tex

    - name: Rename PDF
      run: |
        mv access.pdf conference-paper.pdf
    
    - name: Upload produced PDF
      uses: actions/upload-artifact@v4
      with: 
        name: conference-paper
        path: conference-paper.pdf
    
    - name: Create release for this run
      uses: softprops/action-gh-release@v1
      with:
        # create a unique tag per run so the Releases page shows a new entry
        tag_name: build-${{ github.run_number }}
        name: "Conference Paper - run #${{ github.run_number }}"
        files: conference-paper.pdf
        body: "Automatically generated PDF from run ${{ github.run_number }} (commit: ${{ github.sha }})"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}