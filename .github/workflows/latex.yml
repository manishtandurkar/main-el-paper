name: Build LaTeX
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install TeX Live and tools
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra \
          texlive-bibtex-extra texlive-publishers texlive-science latexmk biber
    
    - name: Build PDF with latexmk
      run: |
        latexmk -pdf -interaction=nonstopmode -file-line-error main.tex
    
    - name: Rename PDF
      run: |
        mv main.pdf conference-paper.pdf
    
    - name: Upload produced PDF
      uses: actions/upload-artifact@v4
      with: 
        name: conference-paper
        path: conference-paper.pdf
    
    - name: Create/Update Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Conference Paper
        files: conference-paper.pdf
        body: "Automatically generated PDF from latest commit"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
